# Example sshttpd configuration
#
# Documents every directive sshttpd accepts. See spec/SSH-WEB-SPEC.md
# for the protocol-level explanation of each one.
#
# A single sshttpd process can host multiple `site` blocks; each gets its own
# TCP listener on the configured port.

site localhost {
    # Port for the SSH-Web listener. Default: 22443.
    port 22443

    # Path to the host's ed25519 private key. Auto-generated on first start
    # if missing. Clients pin this key on first connection (TOFU).
    host-key ./keys/host_ed25519

    # Static content root. Files here are served via `receive-pack`.
    root ./examples/site

    # Optional: forward `api-call` and `mcp` requests to an HTTP backend.
    # When unset, those commands return a "no backend" error.
    # backend http://localhost:8080

    # Optional: file with one OpenSSH-format public key per line.
    # Lines may be prefixed with `tier=trusted` or `tier=identified` to override
    # the default (any presented key = identified).
    # authorized-keys ./keys/authorized_keys

    # Routes the server exposes. Each entry must match an actual command
    # implementation; clients see the full list via `capabilities`.
    commands {
        receive-pack /{path*}  # catch-all for static content; must be last if present
        api-call GET  /api/{path*}
        api-call POST /api/{path*}
    }

    # Discovery metadata — surfaced in `capabilities` and queryable via the
    # corresponding command (e.g. `rss-feed /feeds/posts`, `sitemap`, `robots`).
    meta {
        rss-feed /feeds/posts format=atom
        sitemap  /sitemap     dynamic=true
        robots   crawl-delay=5 allow=["/", "/posts/*"]
    }

    # MCP proxy. sshttpd proxies to an existing MCP server — no need to
    # re-declare tool schemas. The server's tools/list response is surfaced
    # directly in `capabilities`. Use `auth` to control per-tool tier access.
    #
    # mcp {
    #     server stdio "python3 /path/to/my_mcp_server.py"
    #     auth {
    #         anonymous  [list_posts, get_post]
    #         identified [create_post]
    #     }
    # }

    # External resource proxying. The browser asks for these via `proxy-call`.
    # Servers fetch and cache so third parties never see the client.
    proxy-cache {
        allow fonts.googleapis.com
        allow fonts.gstatic.com
        allow cdn.jsdelivr.net
        allow unpkg.com
        deny  *
        ttl 24h
        max-size 512MB
        storage /var/cache/sshttpd/localhost/

        # SSRF defenses (defaults). Override only with intent.
        # max-redirects 10
        # allow-redirects true
        # allow-private-ips false
    }

    # Authentication tiers (anonymous = no key, identified = any key,
    # trusted = key listed with `tier=trusted` in authorized-keys).
    # Each tier inherits the lower tier's commands.
    auth {
        anonymous   [receive-pack, api-call GET, proxy-call, rss-feed, sitemap, robots]
        identified  [api-call POST, mcp]
        trusted     [admin-*]
    }

    # Per-tier rate limits. Token-bucket; spec format: <count>/<unit>.
    # Empty or "unlimited" disables the limit. Units: sec, min, hour, day.
    limits {
        anonymous   60/min
        identified  300/min
        trusted     unlimited
    }
}
