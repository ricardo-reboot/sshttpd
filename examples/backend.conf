# Example sshttpd configuration
#
# Documents every directive sshttpd accepts. See spec/SSH-WEB-SPEC.md
# for the protocol-level explanation of each one.
#
# A single sshttpd process can host multiple `site` blocks; each gets its own
# TCP listener on the configured port.

site localhost {
    # Port for the SSH-Web listener. Default: 22443.
    port 22443

    # Path to the host's ed25519 private key. Auto-generated on first start
    # if missing. Clients pin this key on first connection (TOFU).
    host-key ./keys/host_ed25519

    # Static content root. When set, `receive-pack` serves files as a packfile.
    # Omit (or leave empty) to use backend mode instead.
    # root ./examples/site

    # Optional: forward `api-call`, `mcp`, and `receive-pack` (when root is
    # absent) requests to an HTTP backend.
    #
    # Backend mode for receive-pack: if `root` is unset (or a requested path
    # is not found there) and `backend` is set, sshttpd GETs <backend><path>
    # and writes the full HTTP/1.1 wire response (status line + headers + body)
    # to the SSH channel. Content-Type, ETag, and Cache-Control are forwarded
    # natively — no MIME sniffing, no double-compression. The browser
    # ResourceLoader reads this the same way it handles proxy-call responses.
    backend http://localhost:8080

    # Optional: file with one OpenSSH-format public key per line.
    # Lines may be prefixed with `tier=trusted` or `tier=identified` to override
    # the default (any presented key = identified).
    # authorized-keys ./keys/authorized_keys

    # Routes the server exposes. Each entry must match an actual command
    # implementation; clients see the full list via `capabilities`.
    commands {
        receive-pack /{path*}  # catch-all for static content; must be last if present
        proxy-call GET  /{path*}
        # receive-pack /static
        # api-call GET  /api/posts
        # api-call POST /api/posts
    }

    # Discovery metadata — surfaced in `capabilities` and queryable via the
    # corresponding command (e.g. `rss-feed /feeds/posts`, `sitemap`, `robots`).
    meta {
        rss-feed /feeds/posts format=atom
        sitemap  /sitemap     dynamic=true
        robots   crawl-delay=5 allow=["/", "/posts/*"]
    }

    # MCP-compatible tools. AI agents see this list via `capabilities.mcp.tools`
    # and invoke a tool via `mcp <tool_name> key=value...`. When a `backend`
    # is configured, invocations are forwarded as POST /mcp/<tool_name>.
    mcp {
        tool list_posts  { params: [page, limit] }
        tool get_post    { params: [id] }
        tool create_post { params: [title, body] }
    }

    # External resource proxying. The browser asks for these via `proxy-call`.
    # Servers fetch and cache so third parties never see the client.
    proxy-cache {
        # Allow list. `*` = any host. `*.example.com` = subdomain glob.
        # `host.example.com` = exact match. Multiple `allow` lines accepted.
        allow *

        ttl 24h
        max-size 512MB
        storage /var/cache/sshttpd/localhost/

        # SSRF defenses. Defaults shown; uncomment to override.
        # max-redirects 10           # cap on redirect chain (each hop re-checked against allow list)
        # allow-redirects true       # false → surface 30x to client instead of following
        # allow-private-ips false    # true → opens RFC1918, loopback, link-local, cloud-metadata (DEV ONLY)
    }

    # Authentication tiers (anonymous = no key, identified = any key,
    # trusted = key listed with `tier=trusted` in authorized-keys).
    # Each tier inherits the lower tier's commands.
    auth {
        anonymous   [receive-pack, api-call GET, proxy-call, rss-feed, sitemap, robots, mcp]
        identified  [api-call POST, mcp]
        trusted     [admin-*]
    }

    # Per-tier rate limits. Token-bucket; spec format: <count>/<unit>.
    # Empty or "unlimited" disables the limit. Units: sec, min, hour, day.
    limits {
        anonymous   60/min
        identified  300/min
        trusted     unlimited
    }
}
